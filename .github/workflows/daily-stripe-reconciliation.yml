name: Daily Stripe Reconciliation

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  reconcile-stripe-payments:
    runs-on: ubuntu-latest
    steps:
      - name: Run reconciliation Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PAYMENT_RECONCILIATION_SECRET: ${{ secrets.PAYMENT_RECONCILIATION_SECRET }}
        run: |
          curl --fail --show-error --silent \
            --request POST "$SUPABASE_URL/functions/v1/reconcile-stripe-payments" \
            --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            --header "x-reconciliation-secret: $PAYMENT_RECONCILIATION_SECRET"
